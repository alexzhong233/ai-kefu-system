server:
  port: ${SERVER_PORT:8080}
  # 禁用响应压缩，防止 SSE 被缓冲
  compression:
    enabled: false

spring:
  application:
    name: ai-kefu-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aikefu}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jackson:
    default-property-inclusion: non_null
    time-zone: GMT+8
  ai:
    model:
      embedding: dashscope
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:deepseek-v4-flash}
          temperature: 0.7
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
          text-type: document

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aikefu.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.aikefu: DEBUG
    org.springframework.ai: DEBUG

# RAG 分块与检索配置
rag:
  chunk-mode: semantic           # 分块模式: fixed(固定大小) / semantic(语义分块)
  chunk-size: 512                # 目标 chunk token 数（jtokkit 计数）
  chunk-overlap: 64              # 相邻 chunk 重叠 token 数
  min-chunk-size: 50             # 最小 chunk token 数，避免过度碎片化
  similarity-threshold: 0.5      # 向量相似度阈值
  embedding-dimension: 1024      # embedding 向量维度
  semantic:
    similarity-threshold: 0.5    # 语义分块：相邻句子相似度低于此值时切分
    sentence-window: 1           # 语义分块：句子窗口大小（计算相似度时的上下文）
  parent-child:
    enabled: true                # 是否启用 Parent-Child 分块策略
    parent-max-heading-level: 2  # 父级 chunk 最大标题层级（H1、H2 作为父级边界）
  rerank:
    candidate-multiplier: 3      # 重排时多召回倍数（topK * multiplier）
    keyword-weight: 0.2          # 关键词匹配在混合评分中的权重（0-1，仅在 cross-encoder 不可用时生效）
    cross-encoder:
      enabled: true              # 是否启用 DashScope Cross-encoder 重排
      model: gte-rerank          # DashScope rerank 模型名称
