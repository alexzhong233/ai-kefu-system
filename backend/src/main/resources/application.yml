server:
  port: ${SERVER_PORT:8080}
  # 禁用响应压缩，防止 SSE 被缓冲
  compression:
    enabled: false

spring:
  application:
    name: ai-kefu-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aikefu}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jackson:
    default-property-inclusion: non_null
    time-zone: GMT+8
  ai:
    model:
      embedding: dashscope
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:deepseek-v4-flash}
          temperature: 0.7
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
          text-type: document

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aikefu.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.aikefu: DEBUG
    org.springframework.ai: DEBUG
